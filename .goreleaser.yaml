before:
  hooks:
    - go mod tidy
builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
checksum:
  name_template: 'checksums.txt'
release:
  github:
    owner: tryoutshell
    name: tryoutshell
brews:
  - name: tryoutshell
    homepage: "https://github.com/tryoutshell/tryoutshell"
    description: "Interactive terminal-based learning tool for DevSecOps and developer topics"
    repository:
      owner: tryoutshell
      name: homebrew-tap
