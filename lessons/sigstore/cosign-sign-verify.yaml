# lessons/sigstore/cosign-sign-verify.yaml

metadata:
  id: "cosign-sign-verify"
  org: "sigstore"
  title: "Container Image Signing with Cosign"
  description: "Learn to sign and verify container images for supply chain security"
  difficulty: "beginner"
  duration: "20 min"
  prerequisites:
    - "Docker installed"
    - "Basic understanding of containers"
  tags: ["cosign", "signing", "supply-chain"]
  author: "By Rahul"
  version: "1.0"
  resources:
    - title: "Cosign Documentation"
      url: "https://docs.sigstore.dev/cosign/overview"
      type: "docs"
    - title: "Sigstore Blog"
      url: "https://blog.sigstore.dev"
      type: "blog"
    - title: "Cosign GitHub"
      url: "https://github.com/sigstore/cosign"
      type: "github"

# Introduction section (shown once at start)
introduction:
  title: "What You'll Learn"
  content: |
    In this lesson, you will:
    - Understand what Cosign is and why image signing matters
    - Install and verify Cosign
    - Sign a container image with ephemeral keys
    - Verify signatures to ensure image integrity

    **Time:** ~20 minutes
    **Tools:** Cosign, Docker

# Main lesson flow
steps:
  # === SECTION 1: Understanding Cosign ===

  - type: info
    title: "What is Cosign?"
    content: |
      **Cosign** is a tool for signing and verifying container images and other artifacts.

      Think of it like a digital signature for software packages - it proves:
      - **Who** created the image (authenticity)
      - **What** exact image you're running (integrity)
      - **When** it was signed (provenance)

      ### Why Does This Matter?

      Without signing, you can't be sure that `myapp:latest` hasn't been tampered with
      between the registry and your production cluster. An attacker could:
      - Replace your image with malicious code
      - Inject backdoors during CI/CD
      - Modify dependencies without detection

      Cosign prevents this by creating cryptographic signatures that are nearly
      impossible to forge.

      ```yaml
      hello world
      ```

      > 💡 **Fun Fact**: Cosign is part of the Sigstore project, which also includes
      > Fulcio (certificate authority) and Rekor (transparency log).

    # Highlight specific terms/commands in the UI
    highlights:
      - text: "myapp:latest"
        style: "code"
      - text: "Sigstore"
        style: "bold"
      - text: "Client"
        style: "code"

    # Optional: Show a diagram (ASCII art)
    diagram: |
      Registry              Cosign                Your Cluster
      ┌────────┐            ┌──────┐             ┌───────────┐
      │ Image  │───sign────▶│ .sig │────verify──▶│ ✓ Deploy  │
      └────────┘            └──────┘             └───────────┘

    # User must explicitly continue (prevents info overload)
    wait_for_continue: true

  # === SECTION 2: Installation ===

  - type: info
    title: "Installing Cosign"
    content: |
      First, let's check if Cosign is already installed on your system.

      Try running: `cosign version`

      If you see version information, you're all set! Otherwise, install it using:

    # Inline command suggestions (rendered as copyable code blocks)
    code_blocks:
      - label: "macOS (Homebrew)"
        code: "brew install cosign"
        language: "bash"

      - label: "Linux (Binary)"
        code: |
          curl -LO https://github.com/sigstore/cosign/releases/latest/download/cosign-linux-amd64
          sudo mv cosign-linux-amd64 /usr/local/bin/cosign
          sudo chmod +x /usr/local/bin/cosign
        language: "bash"

      - label: "Go Install"
        code: "go install github.com/sigstore/cosign/v2/cmd/cosign@latest"
        language: "bash"

  - type: command
    id: "check-cosign"
    prompt: "Verify Cosign is installed"
    instruction: "Run the command to check your Cosign version:"

    # Example command (shown to user)
    example: "cosign version"

    # Validation (flexible matching)
    validation:
      type: "regex"
      pattern: "cosign.*version|GitVersion"
      case_insensitive: true

    # Multiple validation methods
    alternative_validations:
      - type: "exit_code"
        expected: 0
      - type: "substring"
        contains: "cosign"

    success_msg: "✅ Great! Cosign v{version} is installed."
    fail_msg: "❌ Cosign not found. Please install it using one of the methods above."

    hints:
      - level: 1
        text: "Type: cosign version"
      - level: 2
        text: "If not installed, use: brew install cosign (macOS) or download from GitHub"
      - level: 3
        text: "Still stuck? Check https://docs.sigstore.dev/cosign/installation"

    allow_skip: true
    timeout: 10 # seconds

  # === SECTION 3: Understanding Signing ===

  - type: info
    title: "How Signing Works"
    content: |
      Cosign uses **public key cryptography** to sign images:

      1. **Generate a key pair** (public + private)
         - Private key (secret) → used to sign
         - Public key → used to verify

      2. **Sign the image** with your private key
         - Cosign creates a signature file
         - Signature is stored alongside the image in the registry

      3. **Verify** using the public key
         - Anyone can verify, but only you can sign

      ### Two Signing Modes:

      **🔑 Key-based signing** (what we'll use today)
      - You generate and manage keys
      - Good for testing and private registries

      **🎫 Keyless signing** (recommended for production)
      - Uses OIDC identity (GitHub, Google, etc.)
      - No keys to manage!
      - We'll cover this in the advanced lesson

    # Inline callouts
    callouts:
      - type: "tip"
        text: "In production, always use keyless signing with Fulcio"
      - type: "warning"
        text: "Never commit private keys to Git!"

    wait_for_continue: true

  # === SECTION 4: Generate Keys (Mixed Info + Command) ===

  - type: command
    id: "generate-keys"
    prompt:
      "Generate a key pair"

      # Contextual explanation before the command
    pre_content: |
      Let's generate a test key pair. Cosign will ask you for a password -
      use something simple like `test123` (this is just for learning).

    example: "COSIGN_PASSWORD=test123 cosign generate-key-pair"

    validation:
      type: "file_exists"
      files:
        - "cosign.key"
        - "cosign.pub"

      # Explain what happened after success
    post_content: |
      You should now see two files:
      - `cosign.key` - Your **private** key (keep secret!)
      - `cosign.pub` - Your **public** key (share freely)

      The private key is encrypted with the password you chose.

    success_msg: "✅ Key pair generated successfully!"
    fail_msg: "❌ Key generation failed. Check if you're in a writable directory."

    allow_skip: true

  # === SECTION 5: Signing an Image ===

  - type: info
    title: "Time to Sign!"
    content: |
      Now we'll sign an actual container image. We'll use a public test image
      from Google's container registry.

      The command structure is:
      ```
      cosign sign --key <private-key> <image>
      ```

      Cosign will:
        1. Hash the image layers
        2. Create a signature using your private key
        3. Upload the signature to the registry (as `<image>.sig`)

  - type: command
    id: "create-artifact"
    prompt: "Create a file to sign"

    pre_content: |
      Instead of signing a container image (which requires registry access),
      let's sign a file. This demonstrates the same cryptographic concepts!

      First, let's create a sample artifact that represents a release binary.

    example: "echo 'MyApp v1.0.0 - Production Release' > myapp-release.txt"

    validation:
      type: "file_exists"
      files:
        - "myapp-release.txt"

    post_content: |
      ✅ Artifact created! In real-world scenarios, this could be:
      - A compiled binary
      - A release tarball
      - A configuration file
      - Any file you want to ensure integrity of

    timeout: 10
    allow_skip: false

  - type: command
    id: "sign-artifact"
    prompt: "Sign the artifact"

    pre_content: |
      Now let's sign our artifact using the private key we generated.
      This creates a cryptographic signature that proves:
      1. You created this file
      2. The file hasn't been tampered with

    example: "cosign sign-blob --key cosign.key myapp-release.txt > myapp-release.txt.sig"

    accepted_commands:
      - "cosign sign-blob --key cosign.key myapp-release.txt > myapp-release.txt.sig"
      - "cosign sign-blob --key ./cosign.key myapp-release.txt > myapp-release.txt.sig"
      - "cosign sign-blob --key cosign.key myapp-release.txt"

    validation:
      type: "file_exists"
      files:
        - "myapp-release.txt.sig"

    alternative_validations:
      - type: "output_contains"
        patterns:
          - "MEU" # Signature starts with MEU in base64
          - "MEY" # Or MEY
        any_match: true

    post_content: |
      🎉 **Artifact signed!** The signature is now in myapp-release.txt.sig

      This signature file can be distributed alongside your artifact.
      Anyone with your public key can verify it came from you.

    success_msg: "✅ Artifact signed successfully!"
    fail_msg: "❌ Signing failed. Check that cosign.key exists."

    hints:
      - level: 1
        text: "Use: cosign sign-blob --key cosign.key <filename>"
      - level: 2
        text: "Redirect output to a .sig file using >"
      - level: 3
        text: "Full command: cosign sign-blob --key cosign.key myapp-release.txt > myapp-release.txt.sig"

    timeout: 30
    allow_skip: true

  - type: command
    id: "verify-signature"
    prompt: "Verify the signature"

    pre_content: |
      Now let's verify the signature using the PUBLIC key.
      This proves that the file hasn't been modified since signing.

    example: "cosign verify-blob --key cosign.pub --signature myapp-release.txt.sig myapp-release.txt"

    accepted_commands:
      - "cosign verify-blob --key cosign.pub --signature myapp-release.txt.sig myapp-release.txt"
      - "cosign verify-blob --key ./cosign.pub --signature myapp-release.txt.sig myapp-release.txt"

    validation:
      type: "output_contains"
      patterns:
        - "Verified OK"
      any_match: false

    post_content: |
      ✅ **Signature verified!**

      The "Verified OK" message confirms:
      - The file was signed with the private key
      - The file hasn't been modified since signing
      - The signature is cryptographically valid

    success_msg: "✅ Signature verification successful!"
    fail_msg: "❌ Verification failed. Make sure the signature file exists."

    timeout: 20
    allow_skip: true
  #  - type: command
  #    id: "sign-image"
  #    prompt: "Sign a container image"
  #
  #    pre_content: |
  #      Let's sign the `gcr.io/distroless/static:latest` image.
  #
  #      You'll be prompted for your key password (the one you set earlier).
  #
  #    example:
  #      "cosign sign --key cosign.key gcr.io/distroless/static:latest"
  #
  #      # Allow variations
  #    accepted_commands:
  #      - "cosign sign --key cosign.key gcr.io/distroless/static:latest"
  #      - "cosign sign --key cosign.key gcr.io/distroless/static"
  #      - "cosign sign --key ./cosign.key gcr.io/distroless/static:latest"
  #
