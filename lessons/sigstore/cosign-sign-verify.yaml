  #      type: "output_contains"
  #      patterns:
  #        - "Pushing signature to"
  #        - "Successfully signed"
  #      any_match: true # Match any of the patterns
  #
  #    post_content: |
  #      🎉 **Image signed!** The signature is now stored in the registry.
  #
  #      Notice the output shows where the signature was pushed. Cosign stores
  #      signatures as OCI artifacts alongside the original image.
  #
  #    success_msg: "✅ Image signed successfully!"
  #    fail_msg: "❌ Signing failed. Did you enter the correct password?"
  #
  #    hints:
  #      - level: 1
  #        text: "Make sure to include --key cosign.key"
  #      - level: 2
  #        text: "Enter the password you set during key generation"
  #      - level: 3
  #        text: "Full command: cosign sign --key cosign.key gcr.io/distroless/static:latest"
  #
  #    timeout: 60
  #    allow_skip: true

  # === SECTION 6: Verification ===

  - type: info
    title: "Verifying Signatures"
    content: |
      Now let's verify that our signature is valid. Anyone with the **public key**
      can verify the signature, but only you (with the private key) can create it.

      This is the magic of public key cryptography! 🔐

  - type: command
    id: "verify-image"
    prompt: "Verify the signed image"

    example: "cosign verify --key cosign.pub gcr.io/distroless/static:latest"

    validation:
      type: "output_contains"
      patterns:
        - "Verification for"
        - "successfully verified"
      all_match: false

    post_content: |
      ✨ Verification successful! This proves:
      - The image hasn't been modified
      - It was signed by your private key
      - The signature is valid

      In production, you'd verify images before deploying them to Kubernetes
      using admission controllers like Kyverno or OPA Gatekeeper.

    success_msg: "✅ Signature verified!"
    fail_msg: "❌ Verification failed."

    allow_skip: true

  # === SECTION 7: Knowledge Check (Quiz) ===

  - type: quiz
    title: "Quick Knowledge Check"
    questions:
      - id: "q1"
        question: "What does Cosign use to sign container images?"
        type: "multiple_choice"
        options:
          - "Passwords"
          - "Public key cryptography"
          - "OAuth tokens"
          - "SSH keys"
        answer: 1
        explanation: |
          Cosign uses **public key cryptography** (key pairs or keyless OIDC).
          The private key signs, and the public key verifies.

      - id: "q2"
        question: "Which key should you NEVER share publicly?"
        type: "multiple_choice"
        options:
          - "cosign.pub (public key)"
          - "cosign.key (private key)"
          - "Both"
          - "Neither"
        answer: 1
        explanation: |
          The **private key** (cosign.key) must remain secret! The public key
          (cosign.pub) is meant to be shared so others can verify your signatures.

      - id: "q3"
        question: "Where are Cosign signatures stored?"
        type: "multiple_choice"
        options:
          - "In a separate database"
          - "Inside the container image"
          - "As OCI artifacts in the same registry"
          - "On your local disk only"
        answer: 2
        explanation: |
          Signatures are stored as **OCI artifacts** in the same container registry,
          tagged with a .sig suffix. This keeps signatures close to the images.

  # === SECTION 8: Final Challenge ===

  - type: challenge
    title: "🚀 Final Challenge: Sign Your Own Image"
    description: |
      Now it's your turn! Sign a different image of your choice and verify it.

      **Your task:**
      1. Pick any public image (e.g., `nginx:latest`, `alpine:latest`)
      2. Sign it with your key pair
      3. Verify the signature
      4. Save the verification output to a file called `verification-result.txt`

      **Bonus:** Try signing a local image you've built with Docker!

    # Open-ended verification
    verification:
      type: "custom"
      checks:
        - type: "file_exists"
          path: "verification-result.txt"
        - type: "file_contains"
          path: "verification-result.txt"
          pattern: "successfully verified"

    hints:
      - level: 1
        text: "Use the same commands as before, just change the image name"
      - level: 2
        text: "Redirect output with: cosign verify --key cosign.pub <image> > verification-result.txt"
      - level: 3
        text: |
          Example:
          cosign sign --key cosign.key nginx:latest
          cosign verify --key cosign.pub nginx:latest > verification-result.txt

    success_msg: "🎉 Challenge complete! You've mastered the basics of Cosign!"

    allow_skip: true

