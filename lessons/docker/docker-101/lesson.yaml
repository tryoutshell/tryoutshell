id: docker-101
title: "Docker 101: Container Fundamentals"
description: "Learn Docker from scratch - images, containers, Dockerfiles, volumes, networking"
author: "TryOutShell"
tags: ["docker", "containers", "devops"]
difficulty: "beginner"
duration: "25 min"
version: "1.0"
quiz:
  - question: "What is the difference between a Docker image and a container?"
    options:
      - "They are the same thing"
      - "An image is a template; a container is a running instance of an image"
      - "A container is a template; an image is a running instance"
      - "Images run on the host; containers run in the cloud"
    answer: 1
    explain: "A Docker image is a read-only template with instructions for creating a container. A container is a runnable instance of an image."
  - question: "Which Dockerfile instruction sets the command that runs when a container starts?"
    options: ["FROM", "RUN", "CMD", "COPY"]
    answer: 2
    explain: "CMD specifies the default command to run when the container starts. RUN executes during build time."
  - question: "How do you persist data across container restarts?"
    options: ["Use ENV variables", "Use Docker volumes", "Use EXPOSE", "Use ARG"]
    answer: 1
    explain: "Docker volumes provide persistent storage that survives container restarts and removals."
  - question: "What does 'docker ps' show?"
    options: ["All images", "Running containers", "Docker version", "Network settings"]
    answer: 1
    explain: "docker ps lists currently running containers. Use 'docker ps -a' to see all containers including stopped ones."
  - question: "Which network mode gives a container its own IP on the Docker bridge?"
    options: ["host", "none", "bridge", "overlay"]
    answer: 2
    explain: "Bridge is the default network mode. Each container gets its own IP address on the docker0 bridge network."
