id: slsa
title: "SLSA: Supply-chain Levels for Software Artifacts"
description: "Understand SLSA levels, build provenance, and how to verify software supply chain integrity"
author: "TryOutShell"
tags: ["slsa", "supply-chain", "sigstore", "provenance", "security"]
difficulty: "intermediate"
duration: "25 min"
version: "1.0"
quiz:
  - question: "What does SLSA stand for?"
    options: ["Secure Linux Software Architecture", "Supply-chain Levels for Software Artifacts", "Software Lifecycle Security Assessment", "Standard Library Security Audit"]
    answer: 1
    explain: "SLSA (pronounced 'salsa') stands for Supply-chain Levels for Software Artifacts. It's a security framework by the OpenSSF."
  - question: "At which SLSA level is build provenance first required?"
    options: ["SLSA Level 0", "SLSA Level 1", "SLSA Level 2", "SLSA Level 3"]
    answer: 1
    explain: "SLSA Level 1 (Build L1) requires that the build process is documented and provenance is generated, even if it's not yet tamper-resistant."
  - question: "What is 'build provenance'?"
    options: ["The source code of a project", "Metadata describing how an artifact was built", "A signed Docker image", "A vulnerability scan report"]
    answer: 1
    explain: "Build provenance is authenticated metadata that records what was built, how it was built, and on what infrastructure—enabling verification of the build process."
  - question: "Which tool verifies SLSA provenance for GitHub Actions artifacts?"
    options: ["cosign", "slsa-verifier", "rekor-cli", "opa"]
    answer: 1
    explain: "slsa-verifier is the official tool for verifying SLSA provenance generated by trusted builders like the SLSA GitHub Generator."
  - question: "What makes SLSA Build L3 different from Build L2?"
    options: ["It requires two-person review", "The build runs on hardened, isolated infrastructure", "It mandates code signing", "It requires SBOM generation"]
    answer: 1
    explain: "SLSA Build L3 requires that the build platform is hardened with isolation between builds, preventing one build from influencing another."
